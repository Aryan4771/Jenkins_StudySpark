sonar.projectKey=my-app
sonar.projectName=my-app
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.inclusions=src/**/*.{js,jsx}
sonar.test.inclusions=src/**/*.test.{js,jsx}
sonar.exclusions=build/**,node_modules/**,public/**

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=reports/junit/js-test-results.xml